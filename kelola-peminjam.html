<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiPinjam UPT — Kelola Peminjam</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-success { background-color: #dcfce7; color: #15803d; }
    .badge-warning { background-color: #fef9c3; color: #713f12; }
    .badge-blue { background-color: #dbeafe; color: #1e40af; }
    
    .search-filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .search-input-wrapper {
      position: relative;
      flex: 1;
      max-width: 320px;
    }
    .search-input-wrapper i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }
    .search-input-wrapper input {
      padding-left: 36px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar" id="sidebar-app"></aside>

    <div class="main-wrapper">
      <header class="topbar" id="topbar-app"></header>

      <main class="content-container">
        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1 class="page-title">Kelola Peminjam</h1>
            <p class="page-subtitle">Daftar mahasiswa dan peminjam terdaftar yang menggunakan sistem peminjaman UPT</p>
          </div>
          <div>
            <button class="btn btn-secondary" onclick="exportDataPeminjam()">
              <i class="ti ti-download"></i> Ekspor CSV
            </button>
          </div>
        </div>

        <!-- Main Content Card -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title"><i class="ti ti-users-group" style="margin-right: 6px;"></i> Daftar Mahasiswa / Peminjam</h3>
          </div>
          
          <!-- Search and Filter Bar -->
          <div class="search-filter-bar" style="padding: 0 20px; margin-top: 16px;">
            <div class="search-input-wrapper">
              <i class="ti ti-search"></i>
              <input type="text" id="search-peminjam" class="form-control" placeholder="Cari NIM, nama, atau email..." onkeyup="filterPeminjamTable()">
            </div>
            <div style="font-size: 13px; color: var(--text-secondary);" id="peminjam-count">
              Total: 0 Peminjam
            </div>
          </div>

          <div class="table-container" style="border: none; box-shadow: none;">
            <table class="table">
              <thead>
                <tr>
                  <th style="width: 60px;">No</th>
                  <th>NIM</th>
                  <th>Nama Lengkap</th>
                  <th>Email</th>
                  <th>Nomor HP / WA</th>
                  <th>Status Akun</th>
                </tr>
              </thead>
              <tbody id="peminjam-list">
                <tr>
                  <td colspan="6" class="text-center" style="padding: 30px; color: var(--text-secondary)">
                    <i class="ti ti-loader animate-spin" style="font-size: 20px;"></i> Memuat data peminjam...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/helpers.js"></script>
  <script>
    let peminjamData = [];

    document.addEventListener("DOMContentLoaded", async () => {
      // 1. Guard admin
      const admin = await requireAdmin();

      // 2. Render sidebar & topbar
      renderSidebar("kelola-peminjam");
      renderTopbar("Kelola Peminjam");

      // 3. Load peminjam data
      await loadPeminjam();
    });

    async function loadPeminjam() {
      try {
        const res = await fetch("../api/peminjam");
        const data = await res.json();

        if (data.success) {
          peminjamData = data.data || [];
          renderPeminjam(peminjamData);
        } else {
          showToast(data.error || "Gagal memuat data peminjam", "danger");
        }
      } catch (err) {
        console.error("Load peminjam error:", err);
        showToast("Kesalahan jaringan saat memuat data", "danger");
      }
    }

    function renderPeminjam(list) {
      const tbody = document.getElementById("peminjam-list");
      const countEl = document.getElementById("peminjam-count");
      
      countEl.textContent = `Total: ${list.length} Peminjam`;

      if (!list || list.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="text-center" style="padding: 30px; color: var(--text-secondary)">
              <i class="ti ti-info-circle" style="font-size: 20px; display: block; margin-bottom: 8px;"></i>
              Tidak ada data peminjam ditemukan.
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = list.map((user, index) => {
        return `
          <tr class="peminjam-row">
            <td>${index + 1}</td>
            <td style="font-family: var(--font-mono); font-weight: 500;">${user.nim || "-"}</td>
            <td style="font-weight: 600; color: var(--text-primary);">${user.nama}</td>
            <td>${user.email}</td>
            <td>${user.no_hp || "-"}</td>
            <td>
              <span class="badge badge-success">
                <i class="ti ti-circle-check" style="margin-right: 4px; font-size: 10px;"></i> Aktif
              </span>
            </td>
          </tr>
        `;
      }).join("");
    }

    function filterPeminjamTable() {
      const query = document.getElementById("search-peminjam").value.toLowerCase().trim();
      
      if (!query) {
        renderPeminjam(peminjamData);
        return;
      }

      const filtered = peminjamData.filter(user => {
        const nim = (user.nim || "").toLowerCase();
        const nama = (user.nama || "").toLowerCase();
        const email = (user.email || "").toLowerCase();
        const hp = (user.no_hp || "").toLowerCase();
        
        return nim.includes(query) || nama.includes(query) || email.includes(query) || hp.includes(query);
      });

      renderPeminjam(filtered);
    }

    function exportDataPeminjam() {
      if (!peminjamData || peminjamData.length === 0) {
        showToast("Tidak ada data untuk diekspor", "warning");
        return;
      }

      const rows = peminjamData.map(u => ({
        NIM: u.nim || "",
        "Nama Lengkap": u.nama,
        Email: u.email,
        "Nomor HP / WA": u.no_hp || "",
        Status: "Aktif"
      }));

      exportCSV(rows, "data_peminjam_upt.csv");
      showToast("Data berhasil diekspor sebagai CSV", "success");
    }
  </script>
</body>
</html>
